spring.application.name=lucaflix


# JWT Configuration
app.jwt-secret=${JWT_KEY}
app.jwt-expiration-milliseconds=${JWT_EXPIRATION}

# CORS Configuration - Corrigido
cors.allowed-origins=https://lucaflix.com,http://localhost:5173,http://localhost:5174,http://localhost:*,https://lucasflix.netlify.app,https://js.stripe.com,https://hooks.stripe.com
#cors.allowed-origins=http://46.136.25.252:*,http://46.136.*:3000,http://46.136.*.*,http://46.*.*.*,https://lucaflix.com,http://localhost:5173,http://localhost:5174,https://lucaflix.netlify.app,https://js.stripe.com,https://hooks.stripe.com


# DATABASE (PostgreSQL)
spring.datasource.url=${DB_CONNECTION}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Config
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
debug=true

# Admin Configuration
admin.email=${INIT_EMAIL}
admin.password=${INIT_PASSWORD}
admin.firstname=${INIT_LAST_NAME}
admin.lastname=${INIT_FIRST_NAME}
admin.username=${INIT_USERNAME}



spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.pool-name=LucaflixHikariCP








